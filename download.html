<!DOCTYPE html>
<html>
<head>
  <title>Download</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <div class="logo">klazyOS</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="download.html">Download</a>
    <a href="about.html">About</a>
  </nav>
</header>

<section class="section">
  <h2>klazyOS 26</h2>

  <p>Release build aligned with 2026 cycle.</p>

  <button class="btn">Download v26.0</button>

  <p style="opacity:0.6;font-size:12px;">
    Placeholder download — no actual file.
  </p>
</section>

<script>
window.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(a => {
  if (a.href.startsWith(window.location.origin)) {
    a.addEventListener("click", e => {
      e.preventDefault();
      document.body.classList.remove("loaded");
      setTimeout(() => window.location = a.href, 300);
    });
  }
});
</script>

</body>
</html>
